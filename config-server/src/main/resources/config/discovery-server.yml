server:
  port: 8761
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}


management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,metrics,env

  endpoint:
    health:
      show-details: always