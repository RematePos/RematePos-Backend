# SonarQube Configuration for Microservice POS
# https://docs.sonarqube.org/latest/analysis/analysis-parameters/

sonar.projectKey=microservice-pos
sonar.projectName=Microservice POS
sonar.projectVersion=${project.version}
sonar.projectDescription=POS Microservices Platform

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Patterns for source files
sonar.inclusions=src/**/*.java
sonar.exclusions=**/target/**,**/node_modules/**

# Test patterns
sonar.test.inclusions=src/test/**/*.java

# JaCoCo Coverage Reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Minimum coverage threshold
sonar.coverage.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/entity/**

# Code smells and bugs
sonar.externalIssuesReportPaths=target/spotbugs-report.json

# Duplicate Code
sonar.cpd.cross_project=true

# Language specific settings
sonar.java.binaries=target/classes

# Fail on quality gate?
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Code analysis rules
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

# SonarLint integration
sonar.cs.roslyn.reportFilePaths=target/roslyn-report.json

# Exclusion patterns (don't analyze)
sonar.exclusions=\
  **/test/**,\
  **/target/**,\
  **/src/test/**,\
  **/*Test.java,\
  **/*Tests.java,\
  **/generated/**,\
  **/build/**

# Inclusion patterns
sonar.inclusions=\
  src/main/**/*.java

# Common base path for Java
sonar.java.source=21
sonar.java.target=21

# Generic coverage path (if JaCoCo not available)
sonar.coverage.reportPaths=target/site/jacoco/jacoco.xml

# Properties for multi-module project (POM)
sonar.sources=.

# Link to SCM
sonar.links.scm=https://github.com/tu-org/microservice-pos
sonar.links.ci=https://jenkins.example.com/job/microservice-pos
sonar.links.issue=https://jira.example.com/browse/MPS

