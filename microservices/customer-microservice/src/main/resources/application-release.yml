spring:
  application:
    name: customer-microservice
  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://config-server:8888}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongo:27017/customer_db}
      auto-index-creation: false

server:
  port: ${SERVER_PORT:8091}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.corhuila: INFO
    org.springframework.web: WARN
  pattern:
    json: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c{1}","message":"%m","thread":"%t"}%n'

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

eureka:
  instance:
    prefer-ip-address: true
    hostname: customer-microservice
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka/

