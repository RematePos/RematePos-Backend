name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release
      - main
  pull_request:
    branches:
      - develop
      - release
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Normalize Maven Wrapper Line Endings
        run: sed -i 's/\r$//' ./microservices/customer-microservice/mvnw

      - name: Make Maven Wrapper Executable
        run: chmod +x ./microservices/customer-microservice/mvnw

      - name: Build with Maven
        run: |
          echo "====== BUILD ======"
          ./microservices/customer-microservice/mvnw -f microservices/pom.xml clean package -DskipTests -U

      - name: Run tests
        if: github.event_name == 'push'
        run: |
          echo "====== UNIT TESTS ======"
          ./microservices/customer-microservice/mvnw -f microservices/pom.xml test -Dmaven.test.failure.ignore=true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event_name == 'push'
        with:
          files: '**/target/surefire-reports/TEST-*.xml'
          check_name: Unit Test Results

      - name: SonarQube Analysis
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          echo "====== SONAR ANALYSIS ======"
          ./microservices/customer-microservice/mvnw -f microservices/pom.xml sonar:sonar \
            -Dsonar.projectKey=microservice-pos \
            -Dsonar.projectName="Microservice POS" \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker images
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: microservices/customer-microservice
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/customer-microservice:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-qa:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to QA
        env:
          QA_DEPLOY_TOKEN: ${{ secrets.QA_DEPLOY_TOKEN }}
        run: |
          echo "====== DEPLOYING TO QA ======"
          # Add your deployment script here
          # Example: kubectl set image deployment/customer-microservice customer-microservice=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/customer-microservice:${{ github.sha }}
          echo "âœ… Deployment to QA completed"

  deploy-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment:
      name: release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Release
        env:
          RELEASE_DEPLOY_TOKEN: ${{ secrets.RELEASE_DEPLOY_TOKEN }}
        run: |
          echo "====== DEPLOYING TO RELEASE ======"
          # Add your deployment script here
          echo "âœ… Deployment to Release completed"

  deploy-main:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          PROD_DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
        run: |
          echo "====== DEPLOYING TO PRODUCTION ======"
          # Add your deployment script here
          echo "âœ… Deployment to Production completed"



